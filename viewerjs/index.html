<script src="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.7/viewer.min.js"></script>
<script>
const v = (el, V, p, z, v) => [
	z = (p = (V = Viewer).prototype).zoom, 
	p.zoom = function(ratio){ratio = ratio * 5; return z.apply(this, arguments)}, 
	v = new V(el, { hidden: () => v.destroy(), toolbar: { zoomIn: 1, zoomOut: 1, oneToOne: 1 } })
][2].show()
</script>
